<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JobScope AI – Job Authenticity Analyzer</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

:root{
--bg:#020617;
--glass:#0b1224;
--text:#e5e7eb;
--accent:#38bdf8;
--accent2:#a78bfa;
--good:#22c55e;
--bad:#fb7185;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Inter;
background:radial-gradient(circle at top,#020617,#000);
color:var(--text);
}

nav{
padding:25px 60px;
font-family:Orbitron;
font-size:22px;
color:var(--accent);
}

/* HERO */

.hero{
padding:120px 80px;
max-width:800px;
}

.hero h1{
font-size:60px;
}

.hero span{
color:var(--accent);
}

.hero p{
margin-top:20px;
opacity:.8;
}

/* BUTTON */

.btn{
margin-top:25px;
padding:14px 28px;
border:none;
border-radius:12px;
font-weight:600;
background:linear-gradient(135deg,var(--accent),var(--accent2));
color:black;
cursor:pointer;
}

/* ANALYZER */

.analyzer{
padding:80px 60px;
text-align:center;
}

input{
width:60%;
padding:14px;
border-radius:10px;
background:#020617;
border:1px solid #334155;
color:white;
}

/* LOADER */

#loader{
display:none;
margin-top:30px;
}

.spinner{
width:45px;
height:45px;
border:5px solid #1e293b;
border-top:5px solid var(--accent);
border-radius:50%;
margin:auto;
animation:spin 1s linear infinite;
}

@keyframes spin{
to{transform:rotate(360deg);}
}

/* RESULT */

#result{
display:none;
margin-top:40px;
font-size:26px;
}

.real{
color:var(--good);
}

.fake{
color:var(--bad);
}

/* SENTIMENT PAGE */

#sentimentPage{
display:none;
padding:80px;
text-align:center;
}

.card{
background:var(--glass);
padding:30px;
border-radius:14px;
max-width:600px;
margin:auto;
}

</style>
</head>

<body>

<nav>JobScope AI</nav>

<section class="hero">

<h1>Detect <span>Fake Jobs</span><br>Before You Apply</h1>

<p>AI powered system that verifies job authenticity and analyzes market sentiment.</p>

<button class="btn"
onclick="document.getElementById('analyzer').scrollIntoView({behavior:'smooth'})">
Start
</button>

</section>


<section class="analyzer" id="analyzer">

<h2>Paste Job URL</h2><br>

<input id="url" placeholder="https://remoteok.com/...">

<br>

<button class="btn" onclick="checkJob()">
Analyze Job
</button>



<div id="loader">
<div class="spinner"></div>
<p>Analyzing job authenticity...</p>
</div>

<div id="result"></div>

</section>


<section id="sentimentPage">

<h2>Market Sentiment Analysis</h2><br>

<div class="card">

<p id="jobTitle"></p>
<br>

<button class="btn" onclick="runSentiment()">
Analyze Sentiment
</button>

<br><br>

<div id="sentimentResult"></div>

</div>

</section>


<script>

async function checkJob(){

const urlInput=document.getElementById("url").value.trim();
const loader=document.getElementById("loader");
const result=document.getElementById("result");
const sentimentPage=document.getElementById("sentimentPage");
const jobTitle=document.getElementById("jobTitle");

if(!urlInput){
alert("Paste job URL");
return;
}

loader.style.display="block";
result.style.display="none";
sentimentPage.style.display="none";

try{

const response = await fetch(
"http://127.0.0.1:5000/analyze?url="+encodeURIComponent(urlInput)
);

const data = await response.json();

loader.style.display="none";
result.style.display="block";

if(data.error){
result.innerHTML="⚠️ "+data.error;
result.className="fake";
return;
}

if(data.ml_prediction==="Real Job"){

result.innerHTML="✅ REAL JOB";
result.className="real";

jobTitle.innerText=data.title+" at "+data.company;

setTimeout(()=>{
sentimentPage.style.display="block";
},1200);

}
else{

result.innerHTML="❌ FAKE JOB DETECTED";
result.className="fake";

}

}catch(error){

loader.style.display="none";
alert("Backend connection failed. Make sure Flask server is running.");

console.error(error);

}

}


async function runSentiment(){

const sentimentResult = document.getElementById("sentimentResult");

sentimentResult.innerHTML = "Analyzing sentiment...";

try{

const response = await fetch("http://127.0.0.1:5000/sentiment");

const data = await response.json();

sentimentResult.innerHTML = "📊 " + data.sentiment;

}catch(err){

sentimentResult.innerHTML = "⚠ Sentiment analysis failed";

}

}

</script>

</body>
</html>
